name: Daily Idol Data Sync

on:
  schedule:
    - cron: "0 20 * * *"   # 台灣時間每天 04:00
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx pandas scikit-learn numpy

      - name: Run data pipeline
        env:
          SUPABASE_URL: https://ziiagdrrytyrmzoeegjk.supabase.co
          SUPABASE_KEY: ${{ secrets.IDOLMAPS_ANON_KEY }}
        run: |
          if [ -f "pipeline/run_pipeline.py" ]; then
            python pipeline/run_pipeline.py || echo "⚠ Pipeline had errors, continuing"
          elif [ -f "pipeline/seed_data.py" ]; then
            python pipeline/seed_data.py || echo "⚠ Seed had errors, continuing"
          else
            echo "No pipeline script found, skipping"
          fi
        continue-on-error: true

      - name: Sync idolmaps -> Notion
        env:
          IDOLMAPS_ANON_KEY: ${{ secrets.IDOLMAPS_ANON_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_MEMBERS_DB: 2046ee1e-6124-43e6-8c5e-e7fd02ef038e
          NOTION_GROUPS_DB: 250a50df-827b-40d0-a753-73466d15b72b
          NOTION_LOG_DB: 129ac173-e7bb-408e-b2f7-b1aaac56f0e3
        run: python pipeline/sync_notion.py
        continue-on-error: true

      - name: Commit updated JSON data
        run: |
          git config user.name "idol-bot"
          git config user.email "idol-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add -A
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: auto-update data $(date +%Y-%m-%d)"
            git push origin HEAD:main
          fi
        continue-on-error: true
