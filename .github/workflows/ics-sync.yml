name: ics-sync

on:
  schedule:
    - cron: '5 20 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r crawler/requirements.txt

      - name: Run crawler
        run: |
          python crawler/ics_sync.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add frontend-next/public/data/*.json
          git commit -m "chore: update events from ICS" || echo "No changes"
          git push
